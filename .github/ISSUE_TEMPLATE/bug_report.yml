name: Bug Report
description: File a bug report
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run command '...'
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste relevant error logs or output
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: trust-scorecard version
      placeholder: "0.1.0"

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "3.12"

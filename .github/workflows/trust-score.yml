name: Trust Score Evaluation

on:
  push:
    branches: [main]
    paths:
      - 'models/**'
      - 'trust_scorecard/**'
      - 'benchmarks/**'
  pull_request:
    paths:
      - 'models/**'
      - 'trust_scorecard/**'
  workflow_dispatch:  # Allow manual trigger via GitHub CLI: gh workflow run trust-score.yml
  repository_dispatch:
    types: [evaluate_model]  # Allow triggering via gh api: gh api repos/:owner/:repo/dispatches -f event_type=evaluate_model

jobs:
  extract-claims:
    name: Extract Claims
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Extract claims from all models
        run: |
          python scripts/extract_claims.py \
            --models-dir models/ \
            --output claims.json

      - name: Upload claims artifact
        uses: actions/upload-artifact@v4
        with:
          name: claims
          path: claims.json

  verify:
    name: Verify ${{ matrix.model_id }}
    runs-on: ubuntu-latest
    needs: extract-claims
    strategy:
      matrix:
        model_id:
          - gpt-4.1
          - claude-opus-4.5
          - gemini-2.5-pro
          - deepseek-v3.2
      fail-fast: false  # Continue even if one model fails
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Verify model claims
        run: |
          mkdir -p reports
          python scripts/verify.py \
            --model-id ${{ matrix.model_id }} \
            --models-dir models/ \
            --output reports/${{ matrix.model_id }}.json \
            --tolerance 2.0

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.model_id }}
          path: reports/${{ matrix.model_id }}.json

  aggregate:
    name: Aggregate & Publish Results
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write  # For pushing to gh-pages
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Download all verification reports
        uses: actions/download-artifact@v4
        with:
          pattern: report-*
          path: reports/
          merge-multiple: true

      - name: Aggregate reports
        run: |
          python scripts/aggregate.py \
            --reports-dir reports/ \
            --output trust_scores.json \
            --md trust_scores.md

      - name: Generate dashboard
        run: |
          python scripts/generate_dashboard.py \
            --input trust_scores.json \
            --output docs/index.html

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: trust-scores
          path: |
            trust_scores.json
            trust_scores.md
            docs/index.html

      - name: Commit results to repository
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trust_scores.json trust_scores.md docs/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update trust scores [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages

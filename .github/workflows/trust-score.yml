name: Trust Score Evaluation

on:
  push:
    branches: [main]
    paths:
      - 'models/**'
      - 'trust_scorecard/**'
      - 'benchmarks/**'
  pull_request:
    paths:
      - 'models/**'
      - 'trust_scorecard/**'
  schedule:
    - cron: "0 */12 * * *"  # Twice daily to refresh Ollama model pool
  workflow_dispatch:  # Allow manual trigger via GitHub CLI: gh workflow run trust-score.yml
  repository_dispatch:
    types: [evaluate_model]  # Allow triggering via gh api: gh api repos/:owner/:repo/dispatches -f event_type=evaluate_model

env:
  MAX_MODELS: 50

jobs:
  prepare-matrix:
    name: Build Model Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.emit.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Build matrix (Ollama + catalog)
        id: emit
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          python scripts/build_matrix.py \
            --models-dir models \
            --output matrix.json \
            --max-models ${MAX_MODELS}
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"

  extract-claims:
    name: Extract Claims
    runs-on: ubuntu-latest
    needs: prepare-matrix
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Extract claims from all models
        run: |
          python scripts/extract_claims.py \
            --models-dir models/ \
            --output claims.json

      - name: Upload claims artifact
        uses: actions/upload-artifact@v4
        with:
          name: claims
          path: claims.json

  verify:
    name: Verify ${{ matrix.model_id }}
    runs-on: ubuntu-latest
    needs: [prepare-matrix, extract-claims]
    strategy:
      matrix:
        model_id: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false  # Continue even if one model fails
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Verify model claims
        run: |
          mkdir -p reports
          python scripts/verify.py \
            --model-id ${{ matrix.model_id }} \
            --models-dir models/ \
            --output reports/${{ matrix.model_id }}.json \
            --tolerance 2.0

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.model_id }}
          path: reports/${{ matrix.model_id }}.json

  aggregate:
    name: Aggregate & Publish Results
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Download all verification reports
        uses: actions/download-artifact@v8
        with:
          pattern: report-*
          path: reports/
          merge-multiple: true

      - name: Aggregate reports
        run: |
          python scripts/aggregate.py \
            --reports-dir reports/ \
            --output trust_scores.json \
            --md trust_scores.md

      - name: Generate dashboard
        run: |
          python scripts/generate_dashboard.py \
            --input trust_scores.json \
            --output docs/index.html

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: trust-scores
          path: |
            trust_scores.json
            trust_scores.md
            docs/index.html

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Commit results to repository
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trust_scores.json trust_scores.md docs/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update trust scores [skip ci]"
          git push

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: aggregate
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-image:
    name: Build & Push GHCR Image
    runs-on: ubuntu-latest
    needs: aggregate
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/model-trust-scorecard:latest
            ghcr.io/${{ github.repository_owner }}/model-trust-scorecard:${{ github.sha }}

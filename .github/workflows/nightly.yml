name: Nightly Trust Score Update

on:
  schedule:
    # Run every night at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger via: gh workflow run nightly.yml

jobs:
  nightly-evaluation:
    name: Nightly Re-evaluation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Run batch evaluation
        run: |
          python -m trust_scorecard batch \
            --models-dir models/ \
            --db trust_scores.db \
            --tolerance 2.0

      - name: Export results
        run: |
          python -m trust_scorecard export \
            --db trust_scores.db \
            --output trust_scores.json

      - name: Generate reports
        run: |
          mkdir -p reports
          for model in models/*.json; do
            model_id=$(basename "$model" .json)
            python scripts/verify.py \
              --model-id "$model_id" \
              --models-dir models/ \
              --output "reports/${model_id}.json"
          done

      - name: Aggregate and build dashboard
        run: |
          python scripts/aggregate.py \
            --reports-dir reports/ \
            --output trust_scores.json \
            --md trust_scores.md

          python scripts/generate_dashboard.py \
            --input trust_scores.json \
            --output docs/index.html

      - name: Commit updated scores
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trust_scores.json trust_scores.md trust_scores.db docs/
          git diff --quiet && git diff --staged --quiet || git commit -m "Nightly trust score update $(date +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
